spring.datasource.url=jdbc:h2:mem:backend-pms-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.sql.init.mode=never
spring.jpa.open-in-view=false
server.error.include-message=always

pms.seed.enabled=false
pms.notifications.email.enabled=false
pms.security.jwt.secret=test-only-jwt-secret-change-me-1234567890
