spring.datasource.url=${PMS_DEV_DB_URL:${PMS_DB_URL:jdbc:mysql://${PMS_DB_HOST:127.0.0.1}:${PMS_DB_PORT:3306}/${PMS_DB_NAME:hotel_pms_dev}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${PMS_DB_TIMEZONE:Asia/Kolkata}}}
spring.datasource.username=${PMS_DEV_DB_USERNAME:${PMS_DB_USERNAME:pms_user}}
spring.datasource.password=${PMS_DEV_DB_PASSWORD:${PMS_DB_PASSWORD:PmsUser@123}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.datasource.hikari.maximum-pool-size=${PMS_DEV_DB_POOL_SIZE:${PMS_DB_POOL_SIZE:10}}
spring.datasource.hikari.minimum-idle=${PMS_DEV_DB_MIN_IDLE:${PMS_DB_MIN_IDLE:2}}
spring.datasource.hikari.connection-timeout=${PMS_DEV_DB_CONNECTION_TIMEOUT_MS:${PMS_DB_CONNECTION_TIMEOUT_MS:30000}}
server.error.include-message=always

pms.seed.enabled=${PMS_SEED_ENABLED:true}
pms.super-admin.name=${PMS_SUPER_ADMIN_NAME:Platform Super Admin}
pms.super-admin.email=${PMS_SUPER_ADMIN_EMAIL:superadmin@pms.local}
pms.super-admin.phone=${PMS_SUPER_ADMIN_PHONE:9999999999}
pms.super-admin.password=${PMS_SUPER_ADMIN_PASSWORD:superadmin123}
pms.security.jwt.secret=${PMS_JWT_SECRET:dev-only-jwt-secret-change-me-1234567890}
