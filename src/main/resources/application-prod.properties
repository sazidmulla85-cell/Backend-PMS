spring.datasource.url=${PMS_DB_URL}
spring.datasource.username=${PMS_DB_USERNAME}
spring.datasource.password=${PMS_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.datasource.hikari.maximum-pool-size=${PMS_DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${PMS_DB_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${PMS_DB_CONNECTION_TIMEOUT_MS:30000}
server.error.include-message=never

pms.seed.enabled=false
pms.security.jwt.secret=${PMS_JWT_SECRET}
