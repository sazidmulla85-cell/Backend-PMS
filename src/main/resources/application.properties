spring.application.name=backend-pms
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework
server.error.include-message=${PMS_SERVER_ERROR_INCLUDE_MESSAGE:never}

spring.datasource.url=${PMS_DB_URL:jdbc:mysql://${PMS_DB_HOST:127.0.0.1}:${PMS_DB_PORT:3306}/${PMS_DB_NAME:hotel_pms_dev}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${PMS_DB_TIMEZONE:Asia/Kolkata}}
spring.datasource.username=${PMS_DB_USERNAME:pms_user}
spring.datasource.password=${PMS_DB_PASSWORD:PmsUser@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${PMS_DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${PMS_DB_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${PMS_DB_CONNECTION_TIMEOUT_MS:30000}
spring.sql.init.mode=never

spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=${PMS_JPA_DDL_AUTO:validate}
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=${PMS_FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.servlet.multipart.max-file-size=${PMS_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${PMS_MULTIPART_MAX_REQUEST_SIZE:25MB}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

pms.production-mode=${PMS_PRODUCTION_MODE:false}
pms.seed.enabled=${PMS_SEED_ENABLED:false}
pms.super-admin.name=${PMS_SUPER_ADMIN_NAME:Platform Super Admin}
pms.super-admin.email=${PMS_SUPER_ADMIN_EMAIL:superadmin@pms.local}
pms.super-admin.phone=${PMS_SUPER_ADMIN_PHONE:9999999999}
pms.super-admin.password=${PMS_SUPER_ADMIN_PASSWORD:superadmin123}
pms.storage.upload-dir=${PMS_UPLOAD_DIR:./uploads}
pms.cors.allowed-origins=${PMS_CORS_ALLOWED_ORIGINS:}
pms.frontend.base-url=${PMS_FRONTEND_BASE_URL:}
pms.security.jwt.secret=${PMS_JWT_SECRET:dev-only-jwt-secret-change-me-1234567890}
pms.security.jwt.expiration-ms=${PMS_JWT_EXPIRATION_MS:86400000}
pms.security.password-reset.expiration-minutes=${PMS_PASSWORD_RESET_EXPIRATION_MINUTES:30}

pms.notifications.email.enabled=${PMS_EMAIL_ENABLED:false}
pms.notifications.email.from=${PMS_GMAIL_FROM:no-reply@hotelpms.local}
pms.notifications.email.send-check-in=${PMS_EMAIL_SEND_CHECK_IN:true}
pms.notifications.email.send-check-out=${PMS_EMAIL_SEND_CHECK_OUT:true}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${PMS_GMAIL_USERNAME:}
spring.mail.password=${PMS_GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
