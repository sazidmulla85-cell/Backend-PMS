spring.profiles.active=${APP_PROFILE:dev}
spring.application.name=backend-pms
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.servlet.multipart.max-file-size=${PMS_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${PMS_MULTIPART_MAX_REQUEST_SIZE:25MB}
server.error.include-message=never
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

pms.storage.upload-dir=${PMS_UPLOAD_DIR:./uploads}
pms.cors.allowed-origins=${PMS_CORS_ALLOWED_ORIGINS:}
pms.frontend.base-url=${PMS_FRONTEND_BASE_URL:}
pms.security.jwt.expiration-ms=${PMS_JWT_EXPIRATION_MS:86400000}
pms.security.password-reset.expiration-minutes=${PMS_PASSWORD_RESET_EXPIRATION_MINUTES:30}

pms.notifications.email.enabled=${PMS_EMAIL_ENABLED:false}
pms.notifications.email.from=${PMS_GMAIL_FROM:no-reply@hotelpms.local}
pms.notifications.email.send-check-in=${PMS_EMAIL_SEND_CHECK_IN:true}
pms.notifications.email.send-check-out=${PMS_EMAIL_SEND_CHECK_OUT:true}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${PMS_GMAIL_USERNAME:}
spring.mail.password=${PMS_GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
